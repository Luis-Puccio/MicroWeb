<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroWeb Finca Bonita</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header>
  <div class="logo-container">
    <img class="logo" src="logo.png" alt="Finca Bonita">
  </div>
    <h1>MicroWeb</h1>
    <p>Tarjeta Digital Empresarial Premium</p>
    <div class="actions">
      <a href="tel:+51999999999">Llamar</a>
      <a href="https://wa.me/51999999999">WhatsApp</a>
    </div>
  
</header>

<nav>
<a href="#galeria">Galería</a>
<a href="#videos">Videos</a>
<a href="#social">Redes</a>
<a href="#mapa">Ubicación</a>
<a href="#contacto">Contacto</a>
</nav>

<section id="galeria">
<h2>Galería</h2>
<div class="grid">
<img src="https://picsum.photos/400/300?1">
<img src="https://picsum.photos/400/300?2">
<img src="https://picsum.photos/400/300?3">
<img src="https://picsum.photos/400/300?4">
</div>
</section>

<section id="videos">
<h2>YouTube</h2>
<iframe src="https://www.youtube.com/embed/jNQXAC9IVRw" allowfullscreen></iframe>
</section>

<section id="social">
<h2>Redes Sociales</h2>
<div class="social-float">
<a href="https://facebook.com">Facebook</a>
<a href="https://instagram.com">Instagram</a>
<a href="https://tiktok.com">TikTok</a>
<a href="https://linkedin.com">LinkedIn</a>
<a href="https://drive.google.com">Google Drive</a>
</div>
</section>

<section id="mapa">
<h2>Ubicación</h2>
<iframe src="https://maps.google.com/maps?q=lima&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</section>

<section id="contacto">
<h2>Contacto</h2>
<form>
<input placeholder="Nombre">
<input placeholder="Correo">
<textarea placeholder="Mensaje"></textarea>
<button type="submit">Enviar</button>
</form>
</section>

<script src="js/script.js"></script>
</body>
</html>
